server:
  port: ${SERVER_PORT:6101}
  servlet:
    context-path: /xbl

spring:
  application:
    name: xbl-home
  config:
    import: optional:file:.env[.properties],optional:file:./xbl-home/.env[.properties]
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 120MB

  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:blog}?useSSL=false&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_general_ci
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 10
      max-active: 200
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  liquibase:
    enabled: true
    change-log: classpath:liquibase/master.xml

  quartz:
    job-store-type: memory
    properties:
      org.quartz.scheduler.instanceName: XblHomeScheduler
      org.quartz.threadPool.threadCount: 5

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.xu.home.domain.blog,com.xu.home.domain.calendar,com.xu.home.domain.crawler,com.xu.home.domain.medical,com.xu.home.domain.schedule,com.xu.home.domain.timesheet
  configuration:
    map-underscore-to-camel-case: true

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.xu.home.domain.blog,com.xu.home.domain.calendar,com.xu.home.domain.crawler,com.xu.home.domain.medical,com.xu.home.domain.schedule,com.xu.home.domain.timesheet
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.xu.home.Controller: debug
    com.xu.home.Service: debug
    com.xu.home.mapper: debug

deepseek:
  api:
    url: ${DEEPSEEK_API_URL:https://api.deepseek.com/}
    key: ${DEEPSEEK_API_KEY:}
  model:
    chat: ${DEEPSEEK_CHAT_MODEL:deepseek-chat}
    reasoner: ${DEEPSEEK_REASONER_MODEL:deepseek-reasoner}
  langchain4j:
    base-url: ${DEEPSEEK_LANGCHAIN_BASE_URL:}
    model-name: ${DEEPSEEK_LANGCHAIN_MODEL:}
    log-requests: ${DEEPSEEK_LOG_REQUESTS:false}
    log-responses: ${DEEPSEEK_LOG_RESPONSES:false}

wechat:
  app-id: ${WECHAT_APP_ID:}
  app-secret: ${WECHAT_APP_SECRET:}
  redirect-domain: ${WECHAT_REDIRECT_DOMAIN:https://www.xbl-blog.top}

upload:
  image:
    storage-path: ${UPLOAD_IMAGE_PATH:/home/img}
    domain: ${UPLOAD_IMAGE_DOMAIN:https://www.xbl-blog.top}
    url-prefix: /img

medical:
  knowledge:
    upload-dir: ${MEDICAL_KNOWLEDGE_UPLOAD_DIR:/tmp/xbl-medical/upload}
    allowed-local-roots: ${MEDICAL_KNOWLEDGE_ALLOWED_LOCAL_ROOTS:/tmp,/Users/xubaolin}
    chunk-size: ${MEDICAL_KNOWLEDGE_CHUNK_SIZE:1600}
    max-chunk-size: ${MEDICAL_KNOWLEDGE_MAX_CHUNK_SIZE:2200}
    ai-timeout-seconds: ${MEDICAL_KNOWLEDGE_AI_TIMEOUT_SECONDS:600}
    progress-update-interval: ${MEDICAL_KNOWLEDGE_PROGRESS_UPDATE_INTERVAL:5}

blog:
  jwt:
    secret: ${BLOG_JWT_SECRET:change-this-in-env}
    expire-ms: ${BLOG_JWT_EXPIRE_MS:7200000}
